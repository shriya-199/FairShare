services:
  - type: web
    name: fairshare
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run prisma:generate && pnpm run build
    startCommand: pnpm run prisma:deploy && pnpm run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fairshare-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://fairshare.onrender.com

databases:
  - name: fairshare-db
    plan: free
